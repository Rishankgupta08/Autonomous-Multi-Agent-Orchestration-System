# ==============================================================================
# MOAE Backend — Application Properties
# Phase 1: Database Layer only. No Spring Security yet.
# ==============================================================================

# ------------------------------------------------------------------------------
# Server
# ------------------------------------------------------------------------------
server.port=8080

# ------------------------------------------------------------------------------
# PostgreSQL DataSource
# Database, user, and password created via Section 9 psql commands.
# ------------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/moae_db
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------------------------
# HikariCP Connection Pool
# ------------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------------------------
# Hibernate / JPA
# 'update' → auto-creates / alters tables to match @Entity classes.
# NEVER use 'create-drop' — it destroys all data on every restart.
# ------------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update

# Explicit dialect (Hibernate 6 can auto-detect, but being explicit is safer)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL logging — visible in dev console so we can verify generated DDL & DML
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming strategy:
#   camelCase Java fields  →  snake_case DB columns  (githubLogin → github_login)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# ------------------------------------------------------------------------------
# Jackson (JSON serialization)
# ------------------------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.moae=DEBUG
# ------------------------------------------------------------------------------
# GitHub OAuth2 Registration (Step 2)
# HOW TO GET CREDENTIALS:
#   1. https://github.com/settings/developers → "New OAuth App"
#   2. Application name        → MOAE
#   3. Homepage URL            → http://localhost:8080
#   4. Authorization callback  → http://localhost:8080/login/oauth2/code/github
#   5. Paste Client ID and Secret below (or set as env vars: GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET)
# ------------------------------------------------------------------------------
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email,repo

# ------------------------------------------------------------------------------
# Frontend URL (used by OAuth2LoginSuccessHandler after successful login)
# Dev  → Vite dev server default port (http://localhost:5173)
# Prod → replace with actual Vercel URL before deployment
# ------------------------------------------------------------------------------
moae.frontend.url=http://localhost:5173

# ------------------------------------------------------------------------------
# OpenRouter — Cloud LLM (free tier, Step 5b)
# Free model: deepseek/deepseek-r1:free — zero credits consumed
# Get your key: https://openrouter.ai/keys  (starts with sk-or-v1-...)
# Set env var before running:
#   Windows PS:  $env:OPENROUTER_API_KEY="sk-or-v1-..."
#   macOS/Linux: export OPENROUTER_API_KEY=sk-or-v1-...
# ------------------------------------------------------------------------------
moae.openrouter.base-url=https://openrouter.ai/api/v1
moae.openrouter.api-key=YOUR_OPENROUTER_API_KEY
moae.openrouter.model=openai/gpt-oss-20b:free
moae.openrouter.site-url=http://localhost:5173
moae.openrouter.site-name=MOAE

# ------------------------------------------------------------------------------
# RestTemplate Timeouts (milliseconds) — Step 5
# Two separate RestTemplate beans are configured in RestTemplateConfig.java:
#   externalApiRestTemplate → GitHub / Jira / Slack (fast APIs, 15s read)
#   ollamaRestTemplate      → OpenRouter LLM inference (cloud, 120s read)
# ------------------------------------------------------------------------------
moae.client.external.connect-timeout=10000
moae.client.external.read-timeout=15000

moae.client.ollama.connect-timeout=10000
moae.client.ollama.read-timeout=120000

# ── CORS Allowed Origins ─────────────────────────────────────────────
# Comma-separated list of frontend URLs allowed to call /api/** endpoints.
# allowCredentials=true is set in SecurityConfig, so origins must be
# explicit — wildcard "*" is rejected by browsers when credentials=true.
#
# Format: no spaces around commas, no trailing slash on URLs
# Dev  → Vite default port 5173
# Prod → Your actual Vercel deployment URL (no trailing slash)
#
# Example with Vercel added:
# moae.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://moae-frontend.vercel.app
#
moae.cors.allowed-origins=http://localhost:5173,http://localhost:3000
